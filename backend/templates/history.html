<!DOCTYPE html>
<html>
<head>
    <title>Prediction History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark p-2">
  <a class="navbar-brand" href="/">Churn System</a>
  <a href="/dashboard" class="text-white me-3">Dashboard</a>
  <a href="/history" class="text-white me-3">History</a>
</nav>

<div class="container mt-5">

    <h2 class="text-center mb-4">📜 Prediction History</h2>

    <table class="table table-bordered table-striped text-center">

        <tr>
            <th>ID</th>
            <th>Prediction</th>
            <th>Probability</th>
            <th>Risk Level</th>
        </tr>

        {% for row in data %}
        <tr>
            <td>{{ row[0] }}</td>
            <td>{{ row[1] }}</td>
            <td>{{ row[2] }}%</td>
            <td>{{ row[3] }}</td>
        </tr>
        {% endfor %}

    </table>

</div>

</body>
</html>
